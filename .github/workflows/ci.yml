name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Socket.dev Firewall
        uses: SocketDev/action@v1.3.1
        with:
          mode: firewall-free

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm nx lint meu-app

      - name: Test
        run: pnpm nx test meu-app

      - name: Upload Coverage
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: coverage/meu-app/coverage-final.json
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Build
        run: pnpm nx build meu-app
