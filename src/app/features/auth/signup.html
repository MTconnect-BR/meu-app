<main
  class="flex flex-1 items-center justify-center px-6 py-16"
  style="
    background-color: hsl(0, 0%, 13%);
    color: var(--foreground);
    --background: hsl(0, 0%, 13%);
    --foreground: hsl(0, 0%, 91%);
    --card: hsl(0, 0%, 18%);
    --card-foreground: hsl(0, 0%, 91%);
    --popover: hsl(0, 0%, 18%);
    --popover-foreground: hsl(0, 0%, 91%);
    --primary: hsl(0, 0%, 91%);
    --primary-foreground: hsl(0, 0%, 13%);
    --secondary: hsl(0, 0%, 22%);
    --secondary-foreground: hsl(0, 0%, 91%);
    --muted: hsl(0, 0%, 22%);
    --muted-foreground: hsl(0, 0%, 65%);
    --accent: hsl(0, 0%, 22%);
    --accent-foreground: hsl(0, 0%, 91%);
    --border: hsl(0, 0%, 30%);
    --input: hsl(0, 0%, 22%);
    --ring: hsl(0, 0%, 65%);
  "
>
  <hlm-card class="w-full max-w-md">
    <div hlmCardHeader>
      <h2 hlmCardTitle>Criar conta</h2>
      <p hlmCardDescription>Crie uma nova conta</p>
    </div>
    <div hlmCardContent>
      <form [formGroup]="form" (ngSubmit)="submit()">
        <hlm-field-group class="space-y-4">
          @if (errorMessage) {
            <p class="text-destructive text-sm">{{ errorMessage }}</p>
          }
          <hlm-field>
            <label hlmFieldLabel for="signup-email">Email</label>
            <input
              hlmInput
              id="signup-email"
              type="email"
              placeholder="m@exemplo.com"
              formControlName="email"
            />
            <hlm-field-error validator="required">Email é obrigatório.</hlm-field-error>
            <hlm-field-error validator="email">Digite um email válido.</hlm-field-error>
          </hlm-field>
          <hlm-field>
            <label hlmFieldLabel for="signup-password">Senha</label>
            <input
              hlmInput
              id="signup-password"
              type="password"
              placeholder="••••••••"
              formControlName="password"
            />
            <hlm-field-error validator="required">Senha é obrigatória.</hlm-field-error>
            <hlm-field-error validator="minlength"
              >A senha deve ter pelo menos 6 caracteres.</hlm-field-error
            >
          </hlm-field>
          <hlm-field>
            <label hlmFieldLabel for="signup-confirm-password">Confirmar senha</label>
            <input
              hlmInput
              id="signup-confirm-password"
              type="password"
              placeholder="••••••••"
              formControlName="confirmPassword"
            />
            <hlm-field-error validator="required">Por favor, confirme sua senha.</hlm-field-error>
            <hlm-field-error validator="passwordMismatch">As senhas não coincidem.</hlm-field-error>
          </hlm-field>
          <button hlmBtn type="submit" class="w-full">Criar conta</button>
        </hlm-field-group>
      </form>
    </div>
    <div hlmCardFooter class="border-t-border">
      <p class="text-muted-foreground text-sm">
        Já tem uma conta?
        <a routerLink="/auth/login" class="text-foreground font-medium hover:underline"> Entrar </a>
      </p>
    </div>
  </hlm-card>
</main>
