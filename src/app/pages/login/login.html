<main class="flex flex-1 items-center justify-center px-6 py-16">
  <hlm-card class="w-full max-w-md">
    <div hlmCardHeader>
      <h2 hlmCardTitle>Login</h2>
      <p hlmCardDescription>Enter your email below to login to your account</p>
    </div>
    <div hlmCardContent class="space-y-4">
      <hlm-field>
        <label hlmLabel for="login-email">Email</label>
        <input hlmInput id="login-email" type="email" placeholder="m@example.com" />
      </hlm-field>
      <div class="space-y-2">
        <div class="flex items-center justify-between">
          <label hlmLabel for="login-password">Password</label>
          <a routerLink="/auth/forgot-password" class="text-sm text-muted-foreground hover:underline">
            Forgot your password?
          </a>
        </div>
        <input hlmInput id="login-password" type="password" placeholder="••••••••" />
      </div>
      <button hlmBtn class="w-full">Login</button>
    </div>
    <div hlmCardFooter>
      <p class="text-sm text-muted-foreground">
        Don't have an account?
        <a routerLink="/auth/sign-up" class="font-medium text-foreground hover:underline">
          Sign up
        </a>
      </p>
    </div>
  </hlm-card>
</main>
