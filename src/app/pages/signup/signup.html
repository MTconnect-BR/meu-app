<main class="flex flex-1 items-center justify-center px-6 py-16">
  <hlm-card class="w-full max-w-md">
    <div hlmCardHeader>
      <h2 hlmCardTitle>Sign up</h2>
      <p hlmCardDescription>Create a new account</p>
    </div>
    <div hlmCardContent class="space-y-4">
      <hlm-field>
        <label hlmLabel for="signup-email">Email</label>
        <input hlmInput id="signup-email" type="email" placeholder="m@example.com" />
      </hlm-field>
      <hlm-field>
        <label hlmLabel for="signup-password">Password</label>
        <input hlmInput id="signup-password" type="password" placeholder="••••••••" />
      </hlm-field>
      <hlm-field>
        <label hlmLabel for="signup-confirm-password">Repeat Password</label>
        <input hlmInput id="signup-confirm-password" type="password" placeholder="••••••••" />
      </hlm-field>
      <button hlmBtn class="w-full">Sign up</button>
    </div>
    <div hlmCardFooter class="border-t-border">
      <p class="text-sm text-muted-foreground">
        Already have an account?
        <a routerLink="/auth/login" class="font-medium text-foreground hover:underline">
          Login
        </a>
      </p>
    </div>
  </hlm-card>
</main>
