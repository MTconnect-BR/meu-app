<main class="flex flex-1 items-center justify-center px-6 py-16">
  <hlm-card class="w-full max-w-md">
    <div hlmCardHeader>
      <h2 hlmCardTitle>Criar conta</h2>
      <p hlmCardDescription>Crie uma nova conta</p>
    </div>
    <div hlmCardContent>
      <form [formGroup]="form" (ngSubmit)="submit()">
        <hlm-field-group class="space-y-4">
          @if (errorMessage) {
            <p class="text-sm text-destructive">{{ errorMessage }}</p>
          }
          <hlm-field>
            <label hlmFieldLabel for="signup-email">Email</label>
            <input hlmInput id="signup-email" type="email" placeholder="m@exemplo.com" formControlName="email" />
            <hlm-field-error validator="required">Email é obrigatório.</hlm-field-error>
            <hlm-field-error validator="email">Digite um email válido.</hlm-field-error>
          </hlm-field>
          <hlm-field>
            <label hlmFieldLabel for="signup-password">Senha</label>
            <input hlmInput id="signup-password" type="password" placeholder="••••••••" formControlName="password" />
            <hlm-field-error validator="required">Senha é obrigatória.</hlm-field-error>
            <hlm-field-error validator="minlength">A senha deve ter pelo menos 6 caracteres.</hlm-field-error>
          </hlm-field>
          <hlm-field>
            <label hlmFieldLabel for="signup-confirm-password">Confirmar senha</label>
            <input hlmInput id="signup-confirm-password" type="password" placeholder="••••••••" formControlName="confirmPassword" />
            <hlm-field-error validator="required">Por favor, confirme sua senha.</hlm-field-error>
            <hlm-field-error validator="passwordMismatch">As senhas não coincidem.</hlm-field-error>
          </hlm-field>
          <button hlmBtn type="submit" class="w-full">Criar conta</button>
        </hlm-field-group>
      </form>
    </div>
    <div hlmCardFooter class="border-t-border">
      <p class="text-sm text-muted-foreground">
        Já tem uma conta?
        <a routerLink="/auth/login" class="font-medium text-foreground hover:underline">
          Entrar
        </a>
      </p>
    </div>
  </hlm-card>
</main>
