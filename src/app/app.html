<section class="flex min-h-dvh items-center justify-center bg-[hsl(257,36%,21%)] p-8">
  <hlm-card class="w-full max-w-4xl rounded-[10%] bg-[hsl(258,47%,17%)] p-12 ring-0 shadow-none border-none">
    <div hlmCardContent class="flex flex-col gap-0 px-0">
      @for (stat of stats; track stat.label; let last = $last) {
        <div class="flex flex-col gap-1 py-8">
          <span class="text-5xl font-bold text-white">{{ stat.value }}</span>
          <span class="flex items-center gap-2 text-lg text-white/80">
            {{ stat.label }}
            @if (stat.showInfo) {
              <ng-icon [name]="infoIcon" class="size-4 text-white/50" />
            }
          </span>
          <span class="text-sm text-white/50">{{ stat.date }}</span>
        </div>
        @if (!last) {
          <hlm-separator />
        }
      }
    </div>
  </hlm-card>
</section>
