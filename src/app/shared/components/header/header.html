<button
  type="button"
  (click)="toggleMenu()"
  class="burger-button fixed top-4 left-4 z-[250] flex items-center justify-center"
  [class.is-open]="menuOpen()"
  [attr.aria-label]="menuOpen() ? 'Fechar menu' : 'Abrir menu'"
  [attr.aria-expanded]="menuOpen()"
>
  <span class="burger-icon">
    @if (menuOpen()) {
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 2L12 12M12 2L2 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    } @else {
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 4H14M2 8H14M2 12H14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    }
  </span>
</button>

<!-- Backdrop -->
<div
  class="menu-backdrop"
  [class.is-visible]="menuOpen()"
  role="button"
  tabindex="0"
  aria-label="Fechar menu"
  (click)="closeMenu()"
  (keyup.enter)="closeMenu()"
></div>

<!-- Dropdown panel below burger -->
<nav class="menu-panel fixed left-4 z-[300] flex w-72 flex-col" [class.is-open]="menuOpen()">
  <!-- Nav links -->
  <div class="menu-panel_inner flex flex-1 flex-col">
    <ul class="menu-list">
      <li class="menu-list_item menu-item" style="--index: 0">
        <a routerLink="/" (click)="closeMenu()" class="menu-nav_link">
          <span class="menu-nav_label">Início</span>
        </a>
      </li>
      <li class="menu-list_item menu-item" style="--index: 1">
        <a routerLink="/terms" (click)="closeMenu()" class="menu-nav_link">
          <span class="menu-nav_label">Termos de Serviço</span>
        </a>
      </li>
      <li class="menu-list_item menu-item" style="--index: 2">
        <a routerLink="/privacy" (click)="closeMenu()" class="menu-nav_link">
          <span class="menu-nav_label">Privacidade</span>
        </a>
      </li>
      <li class="menu-list_item menu-item" style="--index: 3">
        <a routerLink="/contact" (click)="closeMenu()" class="menu-nav_link">
          <span class="menu-nav_label">Fale Conosco</span>
        </a>
      </li>
    </ul>

    <!-- Auth CTA -->
    <div class="menu-panel_footer">
      @if (auth.isLoggedIn()) {
        <div class="menu-item menu-auth" style="--index: 4">
          <span class="menu-auth_email">{{ auth.currentUserEmail() }}</span>
          <button class="menu-cta_button" (click)="logout()">
            <span class="menu-cta_label">Sair</span>
          </button>
        </div>
      } @else {
        <a
          routerLink="/login"
          (click)="closeMenu()"
          class="menu-item menu-cta_link"
          style="--index: 4"
        >
          <span class="menu-cta_label">Entrar</span>
        </a>
      }
    </div>
  </div>
</nav>
