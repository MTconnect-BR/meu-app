<div class="fixed inset-x-0 top-0 z-[100]">
  <div class="mx-4 mt-3 lg:mx-auto lg:mt-4 lg:max-w-5xl">
    <header class="flex items-center justify-between rounded-2xl px-5 py-2.5 shadow-lg" [style.background-color]="'hsl(0, 0%, 87%)'">
      <!-- Left: Hamburger -->
      <button (click)="toggleMenu()" class="flex items-center gap-2">
        <ng-icon name="lucideMenu" class="size-5" [style.color]="'hsl(0, 0%, 13%)'" />
      </button>

      <!-- Center: Logo -->
      <a routerLink="/" class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 flex items-center gap-2">
        <ng-icon name="lucideHome" class="size-5" [style.color]="'hsl(0, 0%, 13%)'" />
        <span class="text-lg font-bold" [style.color]="'hsl(0, 0%, 13%)'">MeuApp</span>
      </a>

      <!-- Right: spacer -->
      <div class="w-5"></div>
    </header>
  </div>
</div>

@if (menuOpen()) {
  <!-- Backdrop -->
  <div class="fixed inset-0 z-[200] bg-black/50" role="button" tabindex="0" (click)="closeMenu()" (keydown.escape)="closeMenu()" (keydown.enter)="closeMenu()"></div>

  <!-- Slide-in panel -->
  <nav class="fixed inset-y-0 left-0 z-[300] flex w-72 flex-col border-r p-6 transition-transform duration-300 ease-in-out"
       [style.background-color]="'hsl(0, 0%, 100%)'"
       [style.border-color]="'hsl(0, 0%, 90%)'"
       [class.translate-x-0]="menuOpen()"
       [class.-translate-x-full]="!menuOpen()">

    <!-- Close button -->
    <div class="mb-6 flex items-center justify-between">
      <span class="text-lg font-bold" [style.color]="'hsl(0, 0%, 13%)'">Menu</span>
      <button type="button" (click)="closeMenu()" (keydown.escape)="closeMenu()">
        <ng-icon name="lucideX" class="size-5" [style.color]="'hsl(0, 0%, 50%)'" />
      </button>
    </div>

    <!-- Nav links -->
    <div class="flex flex-col gap-1">
      <a routerLink="/" (click)="closeMenu()" class="rounded-lg px-4 py-3 text-sm font-medium transition-colors hover:bg-black/5"
         [style.color]="'hsl(0, 0%, 13%)'">
        Início
      </a>
      <a routerLink="/properties" (click)="closeMenu()" class="rounded-lg px-4 py-3 text-sm font-medium transition-colors hover:bg-black/5"
         [style.color]="'hsl(0, 0%, 13%)'">
        Imóveis
      </a>
      <a routerLink="/crm" (click)="closeMenu()" class="rounded-lg px-4 py-3 text-sm font-medium transition-colors hover:bg-black/5"
         [style.color]="'hsl(0, 0%, 13%)'">
        CRM
      </a>
    </div>

    <!-- Auth section -->
    <div class="mt-auto border-t pt-4" [style.border-color]="'hsl(0, 0%, 90%)'">
      @if (auth.isLoggedIn()) {
        <div class="flex items-center justify-between px-4">
          <span class="text-xs" [style.color]="'hsl(0, 0%, 50%)'">{{ auth.currentUserEmail() }}</span>
          <button class="rounded-lg px-3 py-2 text-xs font-medium transition-colors hover:bg-black/5"
                  [style.color]="'hsl(0, 0%, 13%)'" (click)="logout()">
            Sair
          </button>
        </div>
      } @else {
        <a routerLink="/auth/login" (click)="closeMenu()" class="block rounded-lg px-4 py-3 text-sm font-medium transition-colors hover:bg-black/5"
           [style.color]="'hsl(0, 0%, 13%)'">
          Entrar
        </a>
      }
    </div>
  </nav>
}
