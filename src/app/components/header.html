<div class="relative z-50 mx-8 mt-3 flex items-center justify-between gap-2 md:mx-16">
  <!-- Left pill: Logo + Nav + Theme toggle -->
  <header class="flex items-center gap-4 rounded-2xl px-5 py-2.5 shadow-lg" [style.background-color]="'#ffffff'">
    <!-- Logo -->
    <a routerLink="/" class="flex items-center gap-2">
      <ng-icon name="lucideHome" class="size-5" [style.color]="'hsl(97, 57%, 61%)'" />
      <span class="text-lg font-bold" [style.color]="'#171717'">MeuApp</span>
    </a>

    <!-- Nav links -->
    <nav class="hidden items-center gap-6 md:flex">
      <a routerLink="/properties" class="text-sm font-medium transition-colors" [style.color]="'#525252'">
        Imóveis
      </a>
      <a routerLink="/crm" class="text-sm font-medium transition-colors" [style.color]="'#525252'">
        CRM
      </a>
    </nav>

    <!-- Theme toggle -->
    <button
      hlmToggle
      size="sm"
      class="size-8 rounded-full p-0"
      (click)="theme.toggle()"
      [attr.aria-label]="theme.darkMode() ? 'Mudar para modo claro' : 'Mudar para modo escuro'"
    >
      @if (theme.darkMode()) {
        <ng-icon name="lucideSun" class="size-4" [style.color]="'#525252'" />
      } @else {
        <ng-icon name="lucideMoon" class="size-4" [style.color]="'#525252'" />
      }
    </button>
  </header>

  <!-- Right pill: CTA or Auth -->
  <div class="flex items-center gap-2 rounded-2xl px-4 py-2.5 shadow-lg" [style.background-color]="'#ffffff'">
    @if (auth.isLoggedIn()) {
      <span class="hidden text-sm sm:inline" [style.color]="'#737373'">{{ auth.currentUserEmail() }}</span>
      <button hlmBtn variant="ghost" size="sm" (click)="logout()" class="text-sm" [style.color]="'#404040'">Sair</button>
    } @else {
      <a routerLink="/auth/login" class="text-sm font-medium transition-colors" [style.color]="'#525252'">
        Entrar
      </a>
      <a routerLink="/properties" hlmBtn size="sm" class="rounded-full px-4 py-2" [style.background-color]="'#171717'" [style.color]="'#ffffff'">
        Ver imóveis
      </a>
    }
  </div>
</div>
