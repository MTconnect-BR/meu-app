<hlm-sheet>
  <div class="fixed inset-x-0 top-0 z-[100]">
    <div class="mx-4 mt-3 lg:mx-auto lg:mt-4 lg:max-w-5xl">
      <header class="flex items-center justify-between rounded-2xl px-5 py-2.5 shadow-lg" [style.background-color]="'hsl(0, 0%, 87%)'">
        <!-- Left: Hamburger -->
        <button hlmSheetTrigger side="left" class="flex items-center gap-2">
          <ng-icon name="lucideMenu" class="size-5" [style.color]="'hsl(0, 0%, 13%)'" />
        </button>

        <!-- Center: Logo -->
        <a routerLink="/" class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 flex items-center gap-2">
          <ng-icon name="lucideHome" class="size-5" [style.color]="'hsl(0, 0%, 13%)'" />
          <span class="text-lg font-bold" [style.color]="'hsl(0, 0%, 13%)'">MeuApp</span>
        </a>

        <!-- Right: spacer -->
        <div class="w-5"></div>
      </header>
    </div>
  </div>

  <hlm-sheet-content side="left" class="w-72">
    <h2 hlmSheetTitle class="text-lg font-bold">Menu</h2>

    <nav class="mt-6 flex flex-col gap-1">
      <a routerLink="/" class="rounded-lg px-4 py-3 text-sm font-medium transition-colors hover:bg-muted"
         [style.color]="'hsl(0, 0%, 13%)'">
        Início
      </a>
      <a routerLink="/properties" class="rounded-lg px-4 py-3 text-sm font-medium transition-colors hover:bg-muted"
         [style.color]="'hsl(0, 0%, 13%)'">
        Imóveis
      </a>
      <a routerLink="/crm" class="rounded-lg px-4 py-3 text-sm font-medium transition-colors hover:bg-muted"
         [style.color]="'hsl(0, 0%, 13%)'">
        CRM
      </a>
    </nav>

    <div class="mt-auto border-t pt-4">
      @if (auth.isLoggedIn()) {
        <div class="flex items-center justify-between px-4">
          <span class="text-xs" [style.color]="'hsl(0, 0%, 50%)'">{{ auth.currentUserEmail() }}</span>
          <button class="rounded-lg px-3 py-2 text-xs font-medium transition-colors hover:bg-muted"
                  [style.color]="'hsl(0, 0%, 13%)'" (click)="logout()">
            Sair
          </button>
        </div>
      } @else {
        <a routerLink="/auth/login" class="block rounded-lg px-4 py-3 text-sm font-medium transition-colors hover:bg-muted"
           [style.color]="'hsl(0, 0%, 13%)'">
          Entrar
        </a>
      }
    </div>
  </hlm-sheet-content>
</hlm-sheet>
