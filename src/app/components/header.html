<header class="relative z-50 mx-4 mt-3 rounded-full px-6 py-3 shadow-lg" style="background-color: #ffffff !important;">
  <div class="flex items-center justify-between">
    <!-- Logo -->
    <a routerLink="/" class="flex items-center gap-2">
      <ng-icon name="lucideHome" class="size-5" style="color: hsl(97, 57%, 61%) !important;" />
      <span class="text-lg font-bold" style="color: #171717 !important;">MeuApp</span>
    </a>

    <!-- Nav links -->
    <nav class="hidden items-center gap-8 md:flex">
      <a routerLink="/properties" class="text-sm font-medium transition-colors" style="color: #525252 !important;">
        Imóveis
      </a>
      <a routerLink="/crm" class="text-sm font-medium transition-colors" style="color: #525252 !important;">
        CRM
      </a>
    </nav>

    <!-- Right side -->
    <div class="flex items-center gap-3">
      <button
        hlmToggle
        size="sm"
        class="size-8 rounded-full p-0"
        (click)="theme.toggle()"
        [attr.aria-label]="theme.darkMode() ? 'Mudar para modo claro' : 'Mudar para modo escuro'"
      >
        @if (theme.darkMode()) {
          <ng-icon name="lucideSun" class="size-4" />
        } @else {
          <ng-icon name="lucideMoon" class="size-4" />
        }
      </button>

      @if (auth.isLoggedIn()) {
        <span class="hidden text-sm sm:inline" style="color: #737373 !important;">{{ auth.currentUserEmail() }}</span>
        <button hlmBtn variant="ghost" size="sm" (click)="logout()" class="text-sm" style="color: #404040 !important;">Sair</button>
      } @else {
        <a routerLink="/auth/login" class="text-sm font-medium transition-colors" style="color: #525252 !important;">
          Entrar
        </a>
        <a routerLink="/properties" hlmBtn size="sm" class="rounded-full px-4 py-2 text-white" style="background-color: #171717 !important;">
          Ver imóveis
        </a>
      }
    </div>
  </div>
</header>
