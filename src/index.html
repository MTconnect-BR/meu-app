<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>MeuApp</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <style>
    :root {
      color-scheme: light;
      --background: hsl(0, 0%, 91%);
      --foreground: hsl(0, 0%, 13%);
      --card: hsl(0, 0%, 87%);
      --card-foreground: hsl(0, 0%, 13%);
      --popover: hsl(0, 0%, 87%);
      --popover-foreground: hsl(0, 0%, 13%);
      --primary: hsl(0, 0%, 13%);
      --primary-foreground: hsl(0, 0%, 91%);
      --secondary: hsl(0, 0%, 87%);
      --secondary-foreground: hsl(0, 0%, 13%);
      --muted: hsl(0, 0%, 91%);
      --muted-foreground: hsl(0, 0%, 40%);
      --accent: hsl(0, 0%, 87%);
      --accent-foreground: hsl(0, 0%, 13%);
      --destructive: oklch(0.577 0.245 27.325);
      --border: hsl(0, 0%, 75%);
      --input: hsl(0, 0%, 87%);
      --ring: hsl(0, 0%, 40%);
      --sidebar: hsl(0, 0%, 87%);
      --sidebar-foreground: hsl(0, 0%, 13%);
      --sidebar-primary: hsl(0, 0%, 13%);
      --sidebar-primary-foreground: hsl(0, 0%, 91%);
      --sidebar-accent: hsl(0, 0%, 91%);
      --sidebar-accent-foreground: hsl(0, 0%, 13%);
      --sidebar-border: hsl(0, 0%, 75%);
      --sidebar-ring: hsl(0, 0%, 40%);
    }
    html, body {
      background-color: var(--background);
      color: var(--foreground);
      min-height: 100dvh;
    }
  </style>
</head>
